# 陽明交大竹韻口琴社官方網站
# 正式網域:https://harmonica.nycu.club/
# GitHub Actions 也會明確使用此正式網域，避免 Pages 回傳的 github.io base URL
# 汙染 canonical、Open Graph、RSS 與 sitemap。
baseURL = "https://harmonica.nycu.club/"
title = "陽明交大竹韻口琴社"
languageCode = "zh-TW"
defaultContentLanguage = "zh-tw"
hasCJKLanguage = true
timeZone = "Asia/Taipei"
enableRobotsTXT = true
enableGitInfo = false
disableKinds = ["taxonomy", "term"]

[pagination]
pagerSize = 12

[outputs]
home = ["html", "rss", "sitemap"]
section = ["html", "rss"]

[services.rss]
limit = 20

[sitemap]
changefreq = "weekly"
priority = 0.5

[markup.goldmark.renderer]
# Sheet 內文一律當純 Markdown,不允許 raw HTML(防呆與防注入)
unsafe = false

[params]
description = "國立陽明交通大學竹韻口琴社官方網站——口琴教學、演出、社課與活動資訊。"
# 現有 Bamboo 公開 Calendar 已由 Sky 核准用於網站完整活動時程。
calendarId = "bmhc1968@gmail.com"

[[menus.main]]
name = "首頁"
pageRef = "/"
weight = 10

[[menus.main]]
name = "相簿"
pageRef = "/gallery"
weight = 20

[[menus.main]]
name = "關於我們"
pageRef = "/about"
weight = 30
