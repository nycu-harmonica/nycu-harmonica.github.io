# 陽明交大竹韻口琴社官方網站
# 正式網域:https://harmonica.nycu.club/
# 注意:GitHub Actions 部署時會以 --baseURL 覆蓋此值(DNS 生效前為 *.github.io 網址),
#       本機 hugo server 也會自動改用 localhost。此處為正式網域的最終值。
baseURL = "https://harmonica.nycu.club/"
title = "陽明交大竹韻口琴社"
languageCode = "zh-TW"
defaultContentLanguage = "zh-tw"
hasCJKLanguage = true
timeZone = "Asia/Taipei"
enableRobotsTXT = true
enableGitInfo = false
disableKinds = ["taxonomy", "term"]

[pagination]
pagerSize = 12

[outputs]
home = ["html", "rss", "sitemap"]
section = ["html", "rss"]

[services.rss]
limit = 20

[sitemap]
changefreq = "weekly"
priority = 0.5

[markup.goldmark.renderer]
# Sheet 內文一律當純 Markdown,不允許 raw HTML(防呆與防注入)
unsafe = false

[params]
description = "國立陽明交通大學竹韻口琴社官方網站——口琴教學、演出、社課與活動資訊。"
# 以下三個值建好對應資源後填入(見 docs/google-setup.md 與 RUNBOOK.md)
calendarId = ""    # 公開 Google Calendar 的日曆 ID,如 xxxx@group.calendar.google.com
sheetEditUrl = ""  # 社團資料 Google Sheet 的編輯網址(僅顯示於維護說明頁)
joinFormUrl = ""   # 入社報名表單網址(首頁「加入我們」按鈕;留空則顯示聯絡方式)

[[menus.main]]
name = "首頁"
pageRef = "/"
weight = 10

[[menus.main]]
name = "公告"
pageRef = "/announcements"
weight = 20

[[menus.main]]
name = "活動"
pageRef = "/events"
weight = 30

[[menus.main]]
name = "相簿"
pageRef = "/gallery"
weight = 40

[[menus.main]]
name = "關於我們"
pageRef = "/about"
weight = 50
