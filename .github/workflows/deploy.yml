# 建置並部署到 GitHub Pages(官方 Actions 流程,不用第三方 action)
#
# 正式網址固定為 https://harmonica.nycu.club/。
# Pages 的 base_url 在自訂網域已生效時仍可能回傳 github.io 網址，因此不可拿來
# 產生 canonical、Open Graph、RSS 或 sitemap URL。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  HUGO_VERSION: 0.157.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Hugo extended
        run: |
          wget -q "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "hugo_extended_${HUGO_VERSION}_linux-amd64.deb"

      # 相簿縮圖快取:照片沒變就不重新轉檔
      - uses: actions/cache@v4
        with:
          path: resources/_gen
          key: hugo-resources-${{ hashFiles('content/gallery/**') }}
          restore-keys: hugo-resources-

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build
        env:
          HUGO_ENVIRONMENT: production
        run: |
          python3 scripts/check_public_content.py
          hugo --gc --minify --baseURL "https://harmonica.nycu.club/"
          python3 scripts/check_seo_outputs.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
